<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --ink: #1a1208; --ink2: #2e2416;
      --paper: #f7f3ec; --paper2: #ede8df; --paper3: #e4ddd2;
      --rule: #c9bfaa; --rule2: #b8ad9a;

      --focus: #c9a84c80;
    }
    
    body {

      color: var(--ink);

    }
