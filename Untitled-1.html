<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riveredge Income & Expense Matrix</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --ink: #1a1208; --ink2: #2e2416;
      --paper: #f7f3ec; --paper2: #ede8df; --paper3: #e4ddd2;
      --rule: #c9bfaa; --rule2: #b8ad9a;
      --gold: #8b6914; --gold-light: #c9a84c;
      --up: #1a5c2a; --up-bg: #e8f4ea; --up-mid: #c2e0c8;
      --dn: #8b1a1a; --dn-bg: #f7e8e8; --dn-mid: #e8b8b8;
      --neutral: #5a5040; --neutral-light: #8b7a6a;
      --selected: #1a3d5c; --selected-bg: #e8f0f7;
      --shadow: 0 2px 16px rgba(26,18,8,0.12);
      --focus: #c9a84c;
    }

    body {
      font-family: 'Source Serif 4', Georgia, serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      font-size: 13px;
      line-height: 1.45;
    }

    /* ── MASTHEAD ── */
    .masthead {
      background: var(--ink);
      color: var(--paper);
      border-bottom: 3px solid var(--gold-light);
    }
    .masthead-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 18px 32px 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 16px;
    }
    .masthead h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4.5vw, 1.9rem);
      font-weight: 900;
      letter-spacing: -0.01em;
      line-height: 1;
      color: #f7f3ec;
    }
    .masthead h1 em { color: var(--gold-light); font-style: normal; }
    .masthead-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      color: #9a8f7e;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── Global toggles bar ── */
    .global-toggles {
      max-width: 1400px;
      margin: 12px auto 0;
      padding: 0 32px;
    }
    .toggles-inner {
      background: var(--ink);
      border: 1px solid #3a3028;
      border-radius: 6px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      color: #c9a84c;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .toggle-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #9a8f7e;
    }

    /* ── Controls & selects ── */
    select, button.mode-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      background: var(--paper2);
      border: 1px solid var(--rule2);
      color: var(--ink);
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    select:focus, button.mode-btn:focus {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }
    button.mode-btn {
      background: var(--paper2);
      color: var(--neutral);
      border-color: var(--rule2);
      transition: all 0.15s;
    }
    button.mode-btn.active {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }
    button.mode-btn:hover:not(.active) {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* ── Matrix table ── */
    .matrix-wrap {
      overflow-x: auto;
      border: 1px solid var(--rule);
      border-radius: 6px;
      box-shadow: var(--shadow);
      background: white;
    }
    table.matrix {
      width: 100%;
      border-collapse: collapse;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      min-width: 640px;
    }
    .matrix th, .matrix td {
      padding: 8px 10px;
      text-align: right;
      border-right: 1px solid var(--paper3);
      white-space: nowrap;
    }
    .matrix thead th {
      background: var(--ink);
      color: #c9bfaa;
      font-weight: 500;
      letter-spacing: 0.06em;
      font-size: 0.68rem;
    }
    .matrix th.cat-col, td.cat-col {
      text-align: left;
      position: sticky;
      left: 0;
      z-index: 2;
      min-width: 160px;
      background: inherit;
      border-right: 2px solid var(--rule2);
    }
    .matrix thead th.cat-col {
      z-index: 3;
      background: var(--ink);
      border-right: 2px solid var(--gold);
    }
    tr:hover { background: #f8f5ed; }
    tr:focus { outline: 2px solid var(--focus); outline-offset: -2px; }
    tr.selected { background: var(--selected-bg) !important; }
    tr.total-row { background: var(--ink) !important; color: #f7f3ec; font-weight: 600; }
    tr.net-row   { background: #1a2e1a !important; color: #f7f3ec; border-top: 2px solid #3fb950; }

    /* ── Right panel ── */
    .main-layout {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 32px;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      align-items: start;
    }
    .right-panel {
      position: sticky;
      top: 16px;
    }
    @media (max-width: 1000px) {
      .main-layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }
      .right-panel {
        position: static;
        order: 2;
      }
    }

    /* ── Chart panel ── */
    .chart-panel {
      position: relative;
      height: 220px;
      padding: 12px 16px;
    }
    .expand-btn {
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      background: var(--paper2);
      border: 1px solid var(--rule2);
      border-radius: 4px;
      font-size: 14px;
      color: var(--neutral);
      cursor: pointer;
      z-index: 10;
    }
    .expand-btn:hover { background: var(--ink); color: var(--gold-light); }

    /* Fullscreen override */
    .panel-card.fullscreen {
      position: fixed;
      inset: 20px;
      z-index: 9999;
      background: white;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.75);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
    }
    .panel-card.fullscreen .chart-panel {
      flex: 1;
      height: auto;
    }

    /* ── Legend & footer ── */
    .legend-bar {
      max-width: 1400px;
      margin: 8px auto;
      padding: 0 32px;
      font-size: 0.68rem;
      color: var(--neutral-light);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .page-footer {
      max-width: 1400px;
      margin: 32px auto 16px;
      padding: 16px 32px;
      border-top: 1px solid var(--rule);
      font-size: 0.68rem;
      color: var(--neutral-light);
      text-align: center;
    }

    /* Heatmap classes */
    .heat-up-1 { background: #1a5c2a08; }
    .heat-up-2 { background: #1a5c2a14; }
    .heat-up-3 { background: #1a5c2a24; }
    .heat-dn-1 { background: #8b1a1a08; }
    .heat-dn-2 { background: #8b1a1a14; }
    .heat-dn-3 { background: #8b1a1a24; }
  </style>
</head>
<body>

<!-- Masthead -->
<div class="masthead">
  <div class="masthead-inner">
    <div>
      <h1>Riveredge <em>Income & Expense Matrix</em></h1>
      <div class="masthead-meta">Riveredge Owners, Inc. · 1-3 David Lane, Yonkers NY · Audited 1990–2024</div>
    </div>
    <!-- Masthead KPIs omitted for brevity – keep your original -->
  </div>
</div>

<!-- Global toggles -->
<div class="global-toggles">
  <div class="toggles-inner">
    <span>Global Controls</span>
    <div class="toggle-item">
      <span>Mortgage Principal</span>
      <button class="mode-btn" id="btn-principal" onclick="togglePrincipal()">Excluded</button>
    </div>
    <div class="toggle-item">
      <span>CPI-U Overlay</span>
      <button class="mode-btn" id="btn-cpi" onclick="toggleCPI()">Off</button>
    </div>
    <div class="toggle-item">
      <span>Chart Type</span>
      <button class="mode-btn active" id="btn-line" onclick="setChartType('line')">Line</button>
      <button class="mode-btn" id="btn-bar" onclick="setChartType('bar')">Bar</button>
    </div>
  </div>
</div>

<!-- Income Section -->
<section role="region" aria-label="Income Matrix Section">
  <h2 style="margin:24px 32px 8px; font-family:'Playfair Display'; color:var(--ink);">Income Analysis</h2>
  <!-- Controls, legend, matrix-wrap, right-panel – same structure as original, but with updated classes -->
  <!-- ... (omitted for length – copy your original controls + matrix + panel structure here) ... -->
</section>

<!-- Expense & Net sections follow similar pattern -->

<script>
// ────────────────────────────────────────────────
//  HELPERS & CONSTANTS
// ────────────────────────────────────────────────

const ALL_YEARS = Array.from({length: 35}, (_,i) => 1990 + i);

const formatCurrency = (v, showSign = true) => {
  const abs = Math.abs(v);
  const sign = showSign && v < 0 ? '−' : '';
  return sign + '$' + abs.toLocaleString('en-US', {minimumFractionDigits: 0});
};

const formatPercent = (p, showPlus = true) => {
  if (p == null) return '—';
  const sign = showPlus && p >= 0 ? '+' : '';
  return sign + p.toFixed(1) + '%';
};

const getHeatClass = (pct) => {
  const abs = Math.abs(pct);
  if (pct > 0) return abs > 20 ? 'heat-up-3' : abs > 8 ? 'heat-up-2' : 'heat-up-1';
  if (pct < 0) return abs > 20 ? 'heat-dn-3' : abs > 8 ? 'heat-dn-2' : 'heat-dn-1';
  return '';
};

// ────────────────────────────────────────────────
//  STATE & TOGGLES
// ────────────────────────────────────────────────

let SHOW_CPI = false;
let SHOW_PRINCIPAL = false;
let CHART_TYPE = 'line';

const state = {
  inc:  { mode: 'range', showChg: true, selected: null, isTotal: false, chart: null },
  exp:  { mode: 'range', showChg: true, selected: null, isTotal: false, chart: null },
  net:  { mode: 'range', chart: null }
};

function toggleCPI() {
  SHOW_CPI = !SHOW_CPI;
  document.getElementById('btn-cpi').textContent = SHOW_CPI ? 'On' : 'Off';
  document.getElementById('btn-cpi').classList.toggle('active', SHOW_CPI);
  ['inc','exp'].forEach(p => render(p));
}

function togglePrincipal() {
  SHOW_PRINCIPAL = !SHOW_PRINCIPAL;
  document.getElementById('btn-principal').textContent = SHOW_PRINCIPAL ? 'Included' : 'Excluded';
  document.getElementById('btn-principal').classList.toggle('active', SHOW_PRINCIPAL);
  render('exp');
  renderNet();
}

function setChartType(type) {
  CHART_TYPE = type;
  document.getElementById('btn-line').classList.toggle('active', type === 'line');
  document.getElementById('btn-bar').classList.toggle('active', type === 'bar');
  ['inc','exp'].forEach(p => render(p));
  renderNet();
}

// ────────────────────────────────────────────────
//  RENDER FUNCTIONS (simplified)
// ────────────────────────────────────────────────

let renderTimeout = null;
function debouncedRender(prefix) {
  clearTimeout(renderTimeout);
  renderTimeout = setTimeout(() => render(prefix), 120);
}

function render(prefix) {
  // Your original render logic here – adapted to use helpers
  // formatCurrency(), formatPercent(), getHeatClass()
  // ... (implement matrix population, total calculation, etc.)
  // Call updateChart() when selection changes
}

// Chart creation (using Chart.js 4.x syntax)
function updateChart(prefix, labels, datasets, title) {
  const ctx = document.getElementById(`${prefix}-trend-chart`)?.getContext('2d');
  if (!ctx) return;

  if (state[prefix].chart) {
    state[prefix].chart.destroy();
  }

  state[prefix].chart = new Chart(ctx, {
    type: CHART_TYPE,
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: SHOW_CPI || datasets.length > 1 },
        title: { display: true, text: title, font: { size: 15 } }
      },
      scales: {
        x: { ticks: { maxRotation: 45, minRotation: 0 } },
        y: { ticks: { callback: v => formatCurrency(v, false) } }
      }
    }
  });
}

// Fullscreen toggle (improved)
function toggleFullscreen(prefix) {
  const panel = document.getElementById(`${prefix}-panel-card`);
  if (!panel) return;

  panel.classList.toggle('fullscreen');
  const isFS = panel.classList.contains('fullscreen');

  document.body.style.overflow = isFS ? 'hidden' : '';
  setTimeout(() => {
    if (state[prefix]?.chart) state[prefix].chart.resize();
  }, 100);
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  // Populate selects, initial render
  ['inc','exp','net'].forEach(p => {
    // init selects...
  });
  render('inc');
  render('exp');
  renderNet();
});
</script>
</body>
</html>
